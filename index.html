<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution Push - Tail Spawn Edition</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="ui-layer">
        <div id="ui-info">
            <div id="ui-main-row">
                <span id="floor-val">B1</span>
                <span class="ui-coin">🪙</span>
                <span id="gold-val">0</span>
                <span class="ui-g">G</span>
            </div>
            <div id="ui-record-row">
                <span id="best-floor-val">(--)</span>
                <span id="best-gold-val">(--)</span>
            </div>
        </div>
        <div id="ui-buttons">
            <button class="icon-btn" onclick="toggleSettings()" title="設定">⚙️</button>
            <button class="icon-btn" onclick="confirmReset()" title="重來">🔄</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="modal-overlay" onclick="toggleSettings()"></div>
    <div id="settings-modal">
        <h3 style="margin-top:0; color:var(--text)">Settings</h3>
        <div class="slider-group">
            <label>BGM Volume</label>
            <input type="range" min="0" max="100" value="50">
        </div>
        <div class="slider-group">
            <label>SFX Volume</label>
            <input type="range" min="0" max="100" value="70">
        </div>
        <button class="btn" style="width:100%" onclick="toggleSettings()">Close</button>
    </div>

    <div id="reset-overlay" onclick="cancelReset()"></div>
    <div id="reset-modal">
        <p class="reset-title">確定要重來嗎？</p>
        <p class="reset-sub">（所持金會歸0且回到B1）</p>
        <div class="reset-btns">
            <button class="btn" onclick="cancelReset()">否</button>
            <button class="btn btn-yes" onclick="doReset()">是</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
